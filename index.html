<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>lindocara - Everwild Hollow</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div id="root"></div>

    <section id="interior" hidden>
      <div class="interior-room">
        <header>
          <span id="interior-title">Wayside House</span>
          <button
            id="interior-close"
            type="button"
            data-i18n-attr="aria-label:interior.close;title:interior.close"
            aria-label="Close threshold view"
            title="Close"
          >
            &times;
          </button>
        </header>
        <div class="room-grid" aria-hidden="true">
          <span class="room-object hearth"></span>
          <span class="room-object table"></span>
          <span class="room-object npc"></span>
          <span class="room-object chest"></span>
          <span class="room-object bench"></span>
          <span class="room-object rug"></span>
        </div>
        <p id="interior-copy">Warm ash, stacked tools, and a locked cedar chest.</p>
      </div>
    </section>

    <div id="event-log" aria-live="polite"></div>

    <section id="chat" class="panel" hidden>
      <div class="chat-title"><span data-i18n="chat.title">Campfire voices</span><kbd>Enter</kbd></div>
      <div id="chat-messages" aria-live="polite"></div>
      <form id="chat-form">
        <input
          id="chat-input"
          maxlength="160"
          autocomplete="off"
          placeholder="Enter: chat..."
          data-i18n-attr="placeholder:chat.placeholder"
        />
      </form>
    </section>

    <div id="prompt" hidden></div>
    <div id="help" hidden>
      <kbd>WASD</kbd> <span data-i18n="help.move">move</span>
      <kbd>Space</kbd> <span data-i18n="help.strike">strike</span>
      <kbd>E</kbd> <span data-i18n="help.commune">commune</span>
      <kbd>Q</kbd> <span data-i18n="help.tonic">tonic</span>
    </div>
    <div id="status"></div>

    <script type="module" src="/src/client/main.tsx"></script>
  </body>
</html>
