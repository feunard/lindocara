# Lindocara Workflow Feature Development And Integration

## Action

Follow the feature-development-and-integration workflow:
1. Edit or add implementation files in src/client, src/server, and src/shared.
2. Update protocol or shared data definitions if needed (e.g., src/shared/protocol.ts).
3. Update or add relevant test files in test/.
4. Update related UI components if necessary (e.g., src/client/ui/).

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: src/client/game/*.ts, src/client/ui/*.tsx, src/server/*.ts

