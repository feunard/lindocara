# Lindocara Workflow Merge Main And Resolve Conflicts

## Action

Follow the merge-main-and-resolve-conflicts workflow:
1. Merge remote-tracking branch 'origin/main'.
2. Resolve merge conflicts in code, tests, or assets.
3. Integrate new or updated assets (e.g., images, sprites).
4. Update documentation and plans/specs if needed.
5. Update or add migration and meta files if database/schema changes are involved.
6. Update tests to match new code or data.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: docs/superpowers/plans/*.md, docs/superpowers/specs/*.md, migrations/*.sql

