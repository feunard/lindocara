name: Deploy

on:
  push:
    branches: [main]
  # Lets you redeploy the current main without pushing an empty commit.
  workflow_dispatch:

concurrency:
  # Never let two deploys race for the same Worker.
  group: deploy-production
  cancel-in-progress: false

jobs:
  # Manual D1 repair for the 0006/0007 split. Available from the default branch UI
  # when launched on fix/d1-migration-0007-split. No Worker deploy.
  repair:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/fix/d1-migration-0007-split'
    name: repair D1 migration 0007
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://lindocara.alepha.dev
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: List remote migrations
        run: npx wrangler d1 migrations list lindocara --remote

      - name: Show d1_migrations table
        run: |
          npx wrangler d1 execute lindocara --remote \
            --command "SELECT * FROM d1_migrations ORDER BY id;"

      - name: Show character table schema
        run: |
          npx wrangler d1 execute lindocara --remote \
            --command "PRAGMA table_info('character');"

      - name: Verify pre-migration state
        run: |
          set -euo pipefail

          migrations_json=$(npx wrangler d1 execute lindocara --remote \
            --command "SELECT name FROM d1_migrations ORDER BY id;" --json)
          echo "$migrations_json"

          if ! echo "$migrations_json" | grep -q "0006_premium_pandemic.sql"; then
            echo "::error::Expected 0006_premium_pandemic.sql to be applied remotely."
            exit 1
          fi
          if echo "$migrations_json" | grep -q "0007_shiny_robin_chapel.sql"; then
            echo "::error::0007_shiny_robin_chapel.sql is already applied — nothing to repair."
            exit 1
          fi
          if echo "$migrations_json" | grep -q "0006_cultured_captain_midlands.sql"; then
            echo "::error::Unexpected 0006_cultured_captain_midlands.sql in d1_migrations."
            exit 1
          fi

          columns_json=$(npx wrangler d1 execute lindocara --remote \
            --command "PRAGMA table_info('character');" --json)
          echo "$columns_json"

          for column in life corpse_x corpse_y; do
            if ! echo "$columns_json" | grep -q "\"name\": \"$column\""; then
              echo "::error::Expected column $column to exist before repair."
              exit 1
            fi
          done

          for column in zone_id instance_id session_epoch ward_run_expires_at; do
            if echo "$columns_json" | grep -q "\"name\": \"$column\""; then
              echo "::error::Column $column must not exist before applying 0007."
              exit 1
            fi
          done

          echo "Pre-migration state matches the expected repair scenario."

      - name: Show D1 database info
        run: npx wrangler d1 info lindocara

      - name: Capture Time Travel bookmark before migration
        run: |
          set -euo pipefail
          echo "Time Travel bookmark to restore production if 0007 must be rolled back:"
          npx wrangler d1 time-travel info lindocara
          bookmark_json=$(npx wrangler d1 time-travel info lindocara --json)
          echo "$bookmark_json"
          bookmark=$(echo "$bookmark_json" | node -e "const input=require('fs').readFileSync(0,'utf8'); console.log(JSON.parse(input).bookmark);")
          if [ -z "$bookmark" ]; then
            echo "::error::Could not read a Time Travel bookmark from wrangler output."
            exit 1
          fi
          echo "RESTORE_BOOKMARK=$bookmark" >> "$GITHUB_ENV"
          echo "::notice title=Time Travel bookmark::Restore with: wrangler d1 time-travel restore lindocara --bookmark=$bookmark"

      - name: Apply pending remote migrations
        run: npx wrangler d1 migrations apply lindocara --remote

      - name: List remote migrations after apply
        run: npx wrangler d1 migrations list lindocara --remote

      - name: Show d1_migrations table after apply
        run: |
          npx wrangler d1 execute lindocara --remote \
            --command "SELECT * FROM d1_migrations ORDER BY id;"

      - name: Show character table schema after apply
        run: |
          npx wrangler d1 execute lindocara --remote \
            --command "PRAGMA table_info('character');"

      - name: Verify post-migration state
        run: |
          set -euo pipefail

          migrations_json=$(npx wrangler d1 execute lindocara --remote \
            --command "SELECT name FROM d1_migrations ORDER BY id;" --json)
          echo "$migrations_json"

          if ! echo "$migrations_json" | grep -q "0007_shiny_robin_chapel.sql"; then
            echo "::error::0007_shiny_robin_chapel.sql was not recorded in d1_migrations."
            exit 1
          fi
          if echo "$migrations_json" | grep -q "0006_cultured_captain_midlands.sql"; then
            echo "::error::Unexpected 0006_cultured_captain_midlands.sql in d1_migrations."
            exit 1
          fi

          columns_json=$(npx wrangler d1 execute lindocara --remote \
            --command "PRAGMA table_info('character');" --json)
          echo "$columns_json"

          for column in zone_id instance_id session_epoch ward_run_expires_at life corpse_x corpse_y; do
            if ! echo "$columns_json" | grep -q "\"name\": \"$column\""; then
              echo "::error::Expected column $column after repair."
              exit 1
            fi
          done

          echo "Post-migration state verified: 0007 applied, all seven columns present."
          echo "Time Travel restore bookmark (pre-0007): $RESTORE_BOOKMARK"

  # Nothing reaches production without passing exactly the checks CI runs on a PR.
  check:
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/ci.yml

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: check
    name: deploy to Cloudflare
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://lindocara.alepha.dev
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download checked build
        uses: actions/download-artifact@v4
        with:
          name: lindocara-build
          path: dist

      # Schema first: code that expects a column must never reach production before the
      # column does. Migrations are additive, so this is safe to run on every deploy.
      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply lindocara --remote

      # Cloudflare's deployments endpoint occasionally returns a transient 522 after the upload
      # has completed. Retry that transport failure only; real Wrangler/configuration failures
      # remain immediately visible.
      - name: Deploy Worker (retry transient 522)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            log=$(mktemp)
            if npx wrangler deploy --config dist/lindocara/wrangler.json 2>&1 | tee "$log"; then
              exit 0
            fi
            if ! grep -q -- "-> 522" "$log"; then
              exit 1
            fi
            if [ "$attempt" = 3 ]; then
              echo "::error::Cloudflare deployments API kept returning 522 after 3 attempts."
              exit 1
            fi
            sleep "$((attempt * 10))"
          done
