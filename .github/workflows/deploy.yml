name: Deploy

on:
  push:
    branches: [main]
  # Lets you redeploy the current main without pushing an empty commit.
  workflow_dispatch:

concurrency:
  # Never let two deploys race for the same Worker.
  group: deploy-production
  cancel-in-progress: false

jobs:
  # Nothing reaches production without passing exactly the checks CI runs on a PR.
  check:
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/ci.yml

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: check
    name: deploy to Cloudflare
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://lindocara.alepha.dev
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download checked build
        uses: actions/download-artifact@v4
        with:
          name: lindocara-build
          path: apps/main/dist

      # Schema first: code that expects a column must never reach production before the
      # column does. Migrations are additive, so this is safe to run on every deploy.
      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply lindocara --remote --config packages/server/wrangler.jsonc

      # Cloudflare's deployments endpoint occasionally returns a transient 522 or an internal
      # code 10013 after the upload has completed. Retry only those known transient failures;
      # real Wrangler/configuration failures remain immediately visible.
      - name: Deploy Worker (retry transient Cloudflare errors)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            log=$(mktemp)
            if npx wrangler deploy --config apps/main/dist/lindocara/wrangler.json 2>&1 | tee "$log"; then
              exit 0
            fi
            if ! grep -Eq -- '-> 522|\[code: 10013\]' "$log"; then
              exit 1
            fi
            if [ "$attempt" = 3 ]; then
              echo "::error::Cloudflare deployments API kept returning transient errors after 3 attempts."
              exit 1
            fi
            echo "::warning::Transient Cloudflare deploy error on attempt $attempt/3; retrying."
            sleep "$((attempt * 10))"
          done
