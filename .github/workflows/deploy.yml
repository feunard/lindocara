name: Deploy

on:
  push:
    branches: [main]
  # Lets you redeploy the current main without pushing an empty commit.
  workflow_dispatch:

concurrency:
  # Never let two deploys race for the same Worker.
  group: deploy-production
  cancel-in-progress: false

jobs:
  # Nothing reaches production without passing exactly the checks CI runs on a PR.
  check:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: check
    name: deploy to Cloudflare
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://lindocara.alepha.dev
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download checked build
        uses: actions/download-artifact@v4
        with:
          name: lindocara-build
          path: dist

      # Schema first: code that expects a column must never reach production before the
      # column does. Migrations are additive, so this is safe to run on every deploy.
      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply lindocara --remote

      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config dist/lindocara/wrangler.json
