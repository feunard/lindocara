name: CI

on:
  pull_request:
  # Let the deploy workflow reuse this exact job rather than duplicating the steps.
  # Pushes to main are covered that way, so there is no `push` trigger here: two runs of
  # the same checks on the same ref would land in the same concurrency group and cancel
  # each other.
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: generated assets, lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # `npm run check` bundles the steps below; CI runs them one by one so a failure names
      # itself in the job graph instead of hiding behind a single "check" step.
      - name: Catalogue up to date
        run: npm run catalog:check

      - name: Maps up to date
        run: npm run map:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      # Catches Vite/Wrangler bundling errors that typecheck and tests cannot see.
      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: lindocara-build
          path: apps/main/dist
          if-no-files-found: error
