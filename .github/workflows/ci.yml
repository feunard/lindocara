name: CI

on:
  pull_request:
  # Let the deploy workflow reuse this exact job rather than duplicating the steps.
  # Pushes to main are covered that way, so there is no `push` trigger here: two runs of
  # the same checks on the same ref would land in the same concurrency group and cancel
  # each other.
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint and format check
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      # Catches Vite/Wrangler bundling errors that typecheck and tests cannot see.
      - name: Build
        run: npm run build
